name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # This step helps us see exactly where we are
      - name: List files for debugging
        run: find . -maxdepth 2 -name "*.xcodeproj"

      - name: Build for Simulator
        run: |
          # We search for the xcodeproj and build it regardless of folder depth
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          
          echo "Building project at $PROJECT_PATH"
          
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "HelloWorldSwiftUI" \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
